services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=manease'
      - 'POSTGRES_PASSWORD=manease_secret'
      - 'POSTGRES_USER=manease'
    ports:
      - '5432:5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U manease -d manease" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - manease-network

  manease:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/manease
      SPRING_DATASOURCE_USERNAME: manease
      SPRING_DATASOURCE_PASSWORD: manease_secret
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - manease-network

networks:
  manease-network:
    driver: bridge